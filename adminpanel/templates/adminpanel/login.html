{% extends 'base.html' %}
{% block title %}KumReport – Admin Login{% endblock %}

{% block extra_styles %}
<style>
  .login-wrap {
    max-width: 380px;
    margin: 80px auto;
    padding: 0 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 10px;
    padding: 36px 32px;
    text-align: center;
  }
  .card h2 { font-size: 20px; color: #185FA5; margin-bottom: 6px; }
  .card p { font-size: 13px; color: #5f5e5a; margin-bottom: 24px; }
  label { display: block; text-align: left; font-size: 12px; color: #5f5e5a; margin-bottom: 4px; }
  input[type="password"] {
    width: 100%; padding: 10px 12px;
    border: 1px solid #b4b2a9; border-radius: 4px;
    font-size: 14px; margin-bottom: 16px;
  }
  button {
    width: 100%; padding: 11px;
    background: #185FA5; color: #fff;
    border: none; border-radius: 6px;
    font-size: 14px; cursor: pointer;
  }
  button:hover { background: #0c447c; }
  .error {
    background: #fcebeb; border: 1px solid #f09595;
    border-radius: 4px; padding: 10px;
    font-size: 12px; color: #a32d2d; margin-bottom: 14px;
  }
  .icon { font-size: 40px; margin-bottom: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="card">
    <div class="icon">🛠️</div>
    <h2>Admin Login</h2>
    <p>Municipal staff only. Enter the admin password to continue.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus>
      <button type="submit">Login</button>
    </form>
  </div>
</div>
{% endblock %}
